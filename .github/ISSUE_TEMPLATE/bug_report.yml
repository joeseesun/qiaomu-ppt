name: Bug report
description: Report a qiaomu-ppt workflow, extraction, layout, or export bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input
      description: URL, PDF type, prompt, or source material description. Do not paste secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include screenshots for visual/layout issues when possible.
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands and checks
      render: bash
      description: Commands you ran and relevant output.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, LibreOffice/Poppler availability, and install method.
